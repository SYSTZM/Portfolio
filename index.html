<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTZM UI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Orbitron', sans-serif;
    background: #0f1923;
    color: white;
}

/* Loader */
#loader {
    position: fixed;
    inset: 0;
    background: #0f1923;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-size: 2rem;
    color: #ff4655;
}

/* Valorant-style glow */
.glow-red {
    box-shadow: 0 0 10px #ff4655, 0 0 20px #ff4655;
}

/* Typing */
.typing {
    border-right: 2px solid #ff4655;
    white-space: nowrap;
    overflow: hidden;
}

/* Panels */
.panel {
    background: rgba(15,25,35,0.9);
    border: 1px solid rgba(255,70,85,0.3);
    backdrop-filter: blur(10px);
}

/* Hover */
.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 25px rgba(255,70,85,0.6);
}

/* Lines overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 3px
    );
    pointer-events: none;
}

</style>
</head>

<body>

<!-- Loader -->
<div id="loader">INITIALIZING...</div>

<div class="p-6 md:p-12">

<!-- Header -->
<div class="flex justify-between items-center mb-12">
    <h1 class="text-3xl md:text-4xl font-bold text-red-500 tracking-widest">SYSTZM</h1>
    <span class="text-sm text-gray-400">ONLINE</span>
</div>

<!-- Main Grid -->
<div class="grid lg:grid-cols-3 gap-8">

<!-- Profile Panel -->
<div class="panel p-6 rounded-xl glow-red">
    <h2 class="text-red-500 mb-4">AGENT PROFILE</h2>

    <img src="codex.jpg" class="w-24 h-24 rounded mb-4 border border-red-500">

    <p class="text-lg">SYSTZM</p>
    <p class="text-sm text-gray-400">Can't hate you</p>

    <div class="mt-6 space-y-2 text-sm">
        <p>Interest: Gaming / Coding</p>
        <p>Language: EN / MM</p>
    </div>
</div>

<!-- Skills Panel -->
<div class="panel p-6 rounded-xl">
    <h2 class="text-red-500 mb-4">LOADOUT</h2>

    <div class="flex flex-wrap gap-2">
        <span class="px-3 py-1 border border-red-500 rounded">Python</span>
        <span class="px-3 py-1 border border-red-500 rounded">HTML</span>
        <span class="px-3 py-1 border border-red-500 rounded">CSS</span>
        <span class="px-3 py-1 border border-red-500 rounded">React</span>
        <span class="px-3 py-1 border border-red-500 rounded">Node.js</span>
        <span class="px-3 py-1 border border-red-500 rounded">Tailwind</span>
    </div>
</div>

<!-- Software Panel -->
<div class="panel p-6 rounded-xl">
    <h2 class="text-red-500 mb-4">SYSTEM TOOLS</h2>

    <div class="flex flex-wrap gap-2">
        <span class="px-3 py-1 border border-red-500 rounded">VS Code</span>
        <span class="px-3 py-1 border border-red-500 rounded">MongoDB</span>
        <span class="px-3 py-1 border border-red-500 rounded">SQLite</span>
        <span class="px-3 py-1 border border-red-500 rounded">Photopea</span>
    </div>
</div>

</div>

<!-- Footer / Status -->
<div class="mt-16 text-center text-gray-500 text-sm">
    <p id="typing" class="typing inline-block"></p>
</div>

</div>

<script>

// Loader
window.onload = () => {
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
    }, 1200);
};

// Typing
const text = "SYSTEM READY // WELCOME AGENT";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById('typing').innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}
type();

</script>

</body>
</html>
